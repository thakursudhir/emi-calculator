<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculate EMI and Interest</title>
    <style>
        /* General Page Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Calculator Container */
        .calculator-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        /* The Specific Heading */
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
            display: inline-block;
            width: 100%;
        }

        /* Input Groups */
        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #007bff;
            outline: none;
        }

        /* Toggle Switch Styling */
        .method-selector {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: #f1f1f1;
            padding: 5px;
            border-radius: 8px;
        }

        .method-option {
            flex: 1;
            text-align: center;
        }

        .method-option input[type="radio"] {
            display: none;
        }

        .method-option label {
            display: block;
            padding: 10px;
            margin: 0;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            color: #555;
            transition: all 0.3s;
        }

        .method-option input[type="radio"]:checked + label {
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }

        /* Button Styling */
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Results Section */
        .results {
            margin-top: 25px;
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            display: none; /* Hidden by default */
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .result-item.total {
            font-weight: bold;
            color: #28a745;
            font-size: 16px;
            border-top: 1px solid #ddd;
            padding-top: 10px;
            margin-top: 10px;
        }

        .result-label {
            color: #555;
        }

        .note {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
            font-style: italic;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <!-- Heading as requested -->
        <h2>Calculate EMI and Interest</h2>

        <!-- Method Selector -->
        <div class="method-selector">
            <div class="method-option">
                <input type="radio" name="calcMethod" id="methodStandard" value="standard" checked>
                <label for="methodStandard">Standard EMI</label>
            </div>
            <div class="method-option">
                <input type="radio" name="calcMethod" id="methodSimple" value="simple">
                <label for="methodSimple">Simple Interest</label>
            </div>
        </div>

        <div class="input-group">
            <label for="amount">Loan Amount (₹)</label>
            <input type="number" id="amount" placeholder="e.g. 100000" min="0">
        </div>

        <div class="input-group">
            <label for="rate">Interest Rate (% per year)</label>
            <input type="number" id="rate" placeholder="e.g. 10" step="0.1" min="0">
        </div>

        <div class="input-group">
            <label for="years">Loan Tenure (Years)</label>
            <input type="number" id="years" placeholder="e.g. 1" min="1">
        </div>
        
        <div class="note" id="methodNote">*Standard EMI uses Reducing Balance Method (Bank Standard)</div>

        <button onclick="calculateEMI()">Calculate</button>

        <div class="results" id="resultBox">
            <div class="result-item">
                <span class="result-label">Monthly EMI:</span>
                <span id="emiDisplay">0.00</span>
            </div>
            <div class="result-item">
                <span class="result-label">Total Interest:</span>
                <span id="interestDisplay">0.00</span>
            </div>
            <div class="result-item total">
                <span class="result-label">Total Payment:</span>
                <span id="totalDisplay">0.00</span>
            </div>
        </div>
    </div>

    <script>
        // Update note text when method changes
        document.getElementById('methodStandard').addEventListener('change', function() {
            document.getElementById('methodNote').innerText = "*Standard EMI uses Reducing Balance Method (Bank Standard)";
        });
        document.getElementById('methodSimple').addEventListener('change', function() {
            document.getElementById('methodNote').innerText = "*Simple Interest calculates on full principal amount";
        });

        function calculateEMI() {
            // 1. Get values from inputs
            const amount = parseFloat(document.getElementById('amount').value);
            const rate = parseFloat(document.getElementById('rate').value);
            const years = parseFloat(document.getElementById('years').value);
            
            // 2. Get selected method
            const method = document.querySelector('input[name="calcMethod"]:checked').value;

            // 3. Validation
            if (isNaN(amount) || isNaN(rate) || isNaN(years) || amount <= 0 || rate < 0 || years <= 0) {
                alert("Please enter valid positive numbers for all fields.");
                return;
            }

            let emi = 0;
            let totalInterest = 0;
            let totalPayment = 0;
            const months = years * 12;

            if (method === 'standard') {
                // --- Standard EMI (Reducing Balance) ---
                const principal = amount;
                const monthlyRate = rate / 12 / 100;
                
                if (rate === 0) {
                    emi = principal / months;
                } else {
                    emi = principal * monthlyRate * (Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
                }
                
                totalPayment = emi * months;
                totalInterest = totalPayment - principal;

            } else {
                // --- Simple Interest (Flat Rate) ---
                const principal = amount;
                // Formula: Interest = (Principal * Rate * Time) / 100
                totalInterest = (principal * rate * years) / 100;
                totalPayment = principal + totalInterest;
                emi = totalPayment / months;
            }

            // 4. Display Results
            document.getElementById('emiDisplay').innerText = "₹ " + emi.toFixed(2);
            document.getElementById('interestDisplay').innerText = "₹ " + totalInterest.toFixed(2);
            document.getElementById('totalDisplay').innerText = "₹ " + totalPayment.toFixed(2);

            // Show the result box
            document.getElementById('resultBox').style.display = 'block';
        }
    </script>

</body>
</html>
